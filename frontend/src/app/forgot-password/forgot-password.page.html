<ion-content [fullscreen]="true" class="auth-page-content">
  <div class="auth-page-shell">
    <section class="auth-card" aria-labelledby="forgotPasswordTitle">
      <h1 id="forgotPasswordTitle">Reset password</h1>
      <p>Enter your e-mail address and the backend will send a reset link.</p>

      <div *ngIf="errorMessage" class="auth-alert auth-alert-error">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="auth-alert auth-alert-success">{{ successMessage }}</div>

      <form class="auth-form" [formGroup]="forgotPasswordForm" (ngSubmit)="submit()">
        <div>
          <label for="forgotPasswordEmail">E-mail</label>
          <input id="forgotPasswordEmail" type="email" formControlName="email" autocomplete="email" />
        </div>

        <button type="submit" class="auth-button" [disabled]="isSubmitting">
          <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
          <span>{{ isSubmitting ? 'Sending link...' : 'Send reset link' }}</span>
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/login">Back to sign in</a>
      </div>
    </section>
  </div>
</ion-content>
