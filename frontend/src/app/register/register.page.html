<ion-content [fullscreen]="true" class="auth-page-content">
  <div class="auth-page-shell">
    <section class="auth-card" aria-labelledby="registerTitle">
      <h1 id="registerTitle">Create account</h1>
      <p>This starter page wires registration to `dj-rest-auth` and mandatory e-mail verification.</p>

      <div *ngIf="errorMessage" class="auth-alert auth-alert-error">{{ errorMessage }}</div>

      <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="submit()">
        <div>
          <label for="registerFirstName">First name</label>
          <input id="registerFirstName" type="text" formControlName="first_name" autocomplete="given-name" />
        </div>

        <div>
          <label for="registerLastName">Last name</label>
          <input id="registerLastName" type="text" formControlName="last_name" autocomplete="family-name" />
        </div>

        <div>
          <label for="registerEmail">E-mail</label>
          <input id="registerEmail" type="email" formControlName="email" autocomplete="email" />
        </div>

        <div>
          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" formControlName="password1" autocomplete="new-password" />
        </div>

        <div>
          <label for="registerPasswordConfirm">Confirm password</label>
          <input id="registerPasswordConfirm" type="password" formControlName="password2" autocomplete="new-password" />
        </div>

        <div *ngIf="registerForm.hasError('passwordMismatch') && registerForm.controls.password2.touched" class="auth-alert auth-alert-error">
          The password fields must match.
        </div>

        <button type="submit" class="auth-button" [disabled]="isSubmitting">
          <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
          <span>{{ isSubmitting ? 'Creating account...' : 'Create account' }}</span>
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/login">Already have an account?</a>
        <a routerLink="/home">Back to home</a>
      </div>
    </section>
  </div>
</ion-content>
