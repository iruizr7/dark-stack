<ion-content [fullscreen]="true" class="auth-page-content">
  <div class="auth-page-shell">
    <section class="auth-card" aria-labelledby="resetPasswordTitle">
      <h1 id="resetPasswordTitle">Choose new password</h1>
      <p>This page consumes the `uid` and `token` from the route and submits them to the backend.</p>

      <div *ngIf="errorMessage" class="auth-alert auth-alert-error">{{ errorMessage }}</div>

      <form class="auth-form" [formGroup]="resetPasswordForm" (ngSubmit)="submit()">
        <div>
          <label for="newPassword1">New password</label>
          <input id="newPassword1" type="password" formControlName="new_password1" autocomplete="new-password" />
        </div>

        <div>
          <label for="newPassword2">Confirm password</label>
          <input id="newPassword2" type="password" formControlName="new_password2" autocomplete="new-password" />
        </div>

        <button type="submit" class="auth-button" [disabled]="isSubmitting">
          <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
          <span>{{ isSubmitting ? 'Updating password...' : 'Save new password' }}</span>
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/login">Back to sign in</a>
      </div>
    </section>
  </div>
</ion-content>
