<ion-content [fullscreen]="true" class="auth-page-content">
  <div class="auth-page-shell">
    <section class="auth-card" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Sign in</h1>
      <p>Use your account credentials to access the starter app.</p>

      <div *ngIf="errorMessage" class="auth-alert auth-alert-error">{{ errorMessage }}</div>
      <div *ngIf="infoMessage" class="auth-alert auth-alert-info">{{ infoMessage }}</div>

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">
        <div>
          <label for="loginEmail">E-mail</label>
          <input id="loginEmail" type="email" formControlName="email" autocomplete="email" />
        </div>

        <div>
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" formControlName="password" autocomplete="current-password" />
        </div>

        <div class="auth-actions">
          <button type="submit" class="auth-button" [disabled]="isSubmitting">
            <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
            <span>{{ isSubmitting ? 'Signing in...' : 'Sign in' }}</span>
          </button>

          <button
            *ngIf="showResendVerification"
            type="button"
            class="auth-inline-button"
            [disabled]="isResendingVerification"
            (click)="resendVerificationEmail()"
          >
            {{ isResendingVerification ? 'Sending verification e-mail...' : 'Resend verification e-mail' }}
          </button>
        </div>
      </form>

      <div class="auth-links">
        <a routerLink="/forgot-password">Forgot your password?</a>
        <a routerLink="/register">Create an account</a>
        <a routerLink="/home">Back to home</a>
      </div>
    </section>
  </div>
</ion-content>
